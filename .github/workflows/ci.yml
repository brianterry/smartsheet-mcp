name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package (dev)
        run: pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check src

      - name: Ruff format
        run: ruff format --check src

      - name: Import check
        run: python -c "import smartsheet_mcp; from smartsheet_mcp.server import mcp; print(mcp.name, smartsheet_mcp.__version__)"